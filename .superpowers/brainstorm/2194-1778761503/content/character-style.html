    <div class="card-body">
      <h3>小型机器人</h3>

  </div>

  <div class="card" data-choice="creature" onclick="toggleSelect(this)">

        <div style="font-size:80px;">🐾</div>

      <p>类似龙/精灵/史莱姆的幻想生物，有尾巴和翅膀。可爱+神秘感，动画表现力丰富，可做各种夸张动作。</p>

  </div>

  <div class="card" data-choice="blob" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#1a0f2e;display:flex;align-items:center;justify-content:center;height:200px;">

        <div style="font-size:80px;">🫧</div>
        <div style="color:#a0a0a0;font-size:12px;margin-top:8px;">示意图 - 实际为精心设计的角色</div>
