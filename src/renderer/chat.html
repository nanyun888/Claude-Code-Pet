<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Courier New', monospace;
    user-select: none;
  }

  .bubble {
    position: absolute;
    inset: 8px;
    background: #2a2a4a;
    border: 2px solid #3a3a5a;
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column;
    gap: 8px;
  }

  .session-bar {
    display: flex; align-items: center; gap: 4px;
    font-size: 9px; color: #888;
    flex-shrink: 0;
    min-width: 0;
  }
  .session-bar .label {
    flex-shrink: 0;
  }
  .session-bar select {
    flex: 1;
    min-width: 0;
    background: #1a1a2e;
    border: 1px solid #3a3a5a;
    border-radius: 4px;
    padding: 3px 4px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 9px;
    outline: none;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-bar select:focus { border-color: #f5c6a0; }
  .session-bar .refresh-btn {
    flex-shrink: 0;
    background: none; border: none;
    color: #888; cursor: pointer;
    font-size: 11px; padding: 2px;
  }
  .session-bar .refresh-btn:hover { color: #f5c6a0; }
  .session-status {
    flex-shrink: 0;
    font-size: 8px;
    color: #a0d8a0;
    white-space: nowrap;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .messages {
    flex: 1;
    min-height: 40px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: #4a4a6a #2a2a4a;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: #2a2a4a; border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: #5a5a7a; }

  .msg {
    font-size: 10px;
    line-height: 1.4;
    padding: 4px 8px;
    border-radius: 6px;
    max-width: 90%;
    word-break: break-word;
  }
  .msg.pet {
    background: #3a3a5a;
    color: #f5e6d0;
    align-self: flex-start;
  }
  .msg.user {
    background: #f5c6a0;
    color: #2a2a4a;
    align-self: flex-end;
  }
  .msg.system {
    background: #222244;
    color: #a0a0c0;
    align-self: center;
    font-size: 9px;
    font-style: italic;
  }

  .input-area {
    flex-shrink: 0;
    display: flex; flex-direction: column;
    gap: 4px;
  }

  .typing {
    font-size: 9px;
    color: #888;
    padding: 0 4px;
    display: none;
    flex-shrink: 0;
  }
  .typing.active { display: block; }

  .input-row {
    display: flex; gap: 6px; align-items: flex-end;
  }

  #chatInput {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 6px 10px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 11px;
    outline: none;
    resize: none;
    line-height: 16px;
    min-height: 16px;
    max-height: 64px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #4a4a6a #1a1a2e;
  }
  #chatInput::-webkit-scrollbar { width: 5px; }
  #chatInput::-webkit-scrollbar-track { background: transparent; }
  #chatInput::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; }
  #chatInput::-webkit-scrollbar-thumb:hover { background: #4a4a6a; }
  #chatInput:focus { border-color: #f5c6a0; }
  #chatInput::placeholder { color: #555; }

  #sendBtn {
    background: #f5c6a0;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    color: #2a2a4a;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    white-space: nowrap;
    height: 28px;
  }
  #sendBtn:hover { background: #f5e6d0; }
  #sendBtn:disabled { opacity: 0.5; cursor: default; }

  .close-btn {
    position: absolute;
    top: 4px; right: 8px;
    background: none; border: none;
    color: #666; cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .close-btn:hover { color: #f5a0a0; }
</style>
</head>
<body>

<div class="bubble">
  <button class="close-btn" onclick="closeBubble()">&times;</button>

  <div class="session-bar">
    <span class="label">Session:</span>
    <select id="sessionSelect">
      <option value="">Default (recent)</option>
    </select>
    <button class="refresh-btn" onclick="loadSessions()" title="刷新会话列表">⟳</button>
    <span class="session-status" id="sessionStatus"></span>
  </div>

  <div class="messages" id="messages">
    <div class="msg pet">你好呀~ 我是你的 Claude Code 小宠物 (=^・ω・^=)</div>
    <div class="msg system">选择上方的 Session 连接到正在运行的 Claude CLI</div>
  </div>

  <div class="input-area">
    <div class="typing" id="typing">输入中...</div>
    <div class="input-row">
      <textarea id="chatInput" rows="1" placeholder="说点什么..." maxlength="1000"></textarea>
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const typing = document.getElementById('typing');
  const sessionSelect = document.getElementById('sessionSelect');
  const sessionStatus = document.getElementById('sessionStatus');

  // i18n
  const _strings = {
    zh: { refresh: '刷新会话列表', default_session: '默认 (最近对话)', loading: '加载失败', selected: '已选择', sessions: '个会话', not_loaded: '聊天模块未加载，请重启应用~', no_reply: '没有收到回复...', conn_failed: '连接失败了，请检查网络和配置~', placeholder: '说点什么...', send: '发送', typing: '输入中...' },
    en: { refresh: 'Refresh sessions', default_session: 'Default (recent)', loading: 'Failed', selected: 'Selected', sessions: 'sessions', not_loaded: 'Chat module not loaded, restart app~', no_reply: 'No reply received...', conn_failed: 'Connection failed, check network and config~', placeholder: 'Say something...', send: 'Send', typing: 'Typing...' },
  };
  let _lang = navigator.language.startsWith('zh') ? 'zh' : 'en';
  function _t(k) { return (_strings[_lang] || _strings.zh)[k] || k; }

  // Apply i18n to static elements
  document.getElementById('chatInput').placeholder = _t('placeholder');
  document.getElementById('sendBtn').textContent = _t('send');
  document.getElementById('typing').textContent = _t('typing');
  document.querySelector('.refresh-btn').title = _t('refresh');

  function addMsg(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  // === Auto-resize textarea (max 4 lines) ===
  const LINE_H = 16;
  const MAX_LINES = 4;

  function autoResize() {
    input.style.height = 'auto';
    const lines = Math.min(MAX_LINES, Math.max(1, Math.ceil(input.scrollHeight / LINE_H)));
    input.style.height = (lines * LINE_H) + 'px';
    input.style.overflowY = (input.scrollHeight > MAX_LINES * LINE_H) ? 'auto' : 'hidden';
  }
  input.addEventListener('input', autoResize);

  // Load sessions
  async function loadSessions() {
    if (!window.chatBridge) return;
    try {
      const sessions = await window.chatBridge.getSessions();
      sessionSelect.innerHTML = '<option value="">' + _t('default_session') + '</option>';
      for (const s of sessions) {
        const date = new Date(s.lastModified);
        const timeStr = date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        const sizeKB = Math.round(s.size / 1024);
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.project + ' (' + timeStr + ', ' + sizeKB + 'KB)';
        sessionSelect.appendChild(opt);
      }
      sessionStatus.textContent = sessions.length + ' ' + _t('sessions');
    } catch (e) {
      sessionStatus.textContent = _t('loading');
    }
  }

  sessionSelect.addEventListener('change', () => {
    sessionStatus.textContent = sessionSelect.value ? _t('selected') : '';
  });

  loadSessions();

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    typing.classList.add('active');

    const sessionId = sessionSelect.value || undefined;

    try {
      if (!window.chatBridge || !window.chatBridge.send) {
        addMsg(_t('not_loaded'), 'pet');
        typing.classList.remove('active');
        sendBtn.disabled = false;
        return;
      }

      const result = await window.chatBridge.send(text, sessionId);
      typing.classList.remove('active');

      if (result.reply) {
        addMsg(result.reply, 'pet');
      } else if (result.error) {
        addMsg(result.error, 'pet');
      } else {
        addMsg(_t('no_reply'), 'pet');
      }
    } catch (e) {
      console.error('[Chat] Error:', e);
      typing.classList.remove('active');
      addMsg(_t('conn_failed'), 'pet');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function closeBubble() {
    if (window.chatBridge) window.chatBridge.close();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
    if (e.key === 'Escape') closeBubble();
  });

  input.focus();
</script>

</body>
</html>
