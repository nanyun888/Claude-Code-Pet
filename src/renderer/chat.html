<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Courier New', monospace;
    user-select: none;
  }

  .bubble {
    position: absolute;
    bottom: 8px; left: 8px; right: 8px;
    background: #2a2a4a;
    border: 2px solid #3a3a5a;
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column;
    gap: 8px;
    max-height: 200px;
  }

  .messages {
    max-height: 120px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: #3a3a5a transparent;
  }

  .msg {
    font-size: 10px;
    line-height: 1.4;
    padding: 4px 8px;
    border-radius: 6px;
    max-width: 90%;
    word-break: break-word;
  }
  .msg.pet {
    background: #3a3a5a;
    color: #f5e6d0;
    align-self: flex-start;
  }
  .msg.user {
    background: #f5c6a0;
    color: #2a2a4a;
    align-self: flex-end;
  }

  .input-row {
    display: flex; gap: 6px;
  }

  #chatInput {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 6px 10px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  #chatInput:focus { border-color: #f5c6a0; }
  #chatInput::placeholder { color: #555; }

  #sendBtn {
    background: #f5c6a0;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    color: #2a2a4a;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #sendBtn:hover { background: #f5e6d0; }
  #sendBtn:disabled { opacity: 0.5; cursor: default; }

  .typing {
    font-size: 9px;
    color: #888;
    padding: 2px 8px;
    display: none;
  }
  .typing.active { display: block; }

  .close-btn {
    position: absolute;
    top: 4px; right: 8px;
    background: none; border: none;
    color: #666; cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .close-btn:hover { color: #f5a0a0; }
</style>
</head>
<body>

<div class="bubble">
  <button class="close-btn" onclick="closeBubble()">&times;</button>
  <div class="messages" id="messages">
    <div class="msg pet">你好呀~ 我是你的 Claude Code 小宠物 (=^・ω・^=)</div>
  </div>
  <div class="typing" id="typing">输入中...</div>
  <div class="input-row">
    <input id="chatInput" placeholder="说点什么..." maxlength="200" autocomplete="off" />
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const typing = document.getElementById('typing');

  let apiKey = '';
  let model = 'claude';
  let baseUrl = '';

  const SYSTEM_PROMPT = '你是一只可爱的像素小狐狸桌面宠物。用中文回复，1-2句简短的话。语气活泼温暖，偶尔用颜文字如 (=^・ω・^=) 或 ~。回复要非常简短。';

  // Model configs
  const MODELS = {
    claude: {
      defaultUrl: 'https://api.anthropic.com',
      modelId: 'claude-haiku-4-5-20251001',
      buildRequest: (text, key, url) => ({
        url: url + '/v1/messages',
        options: {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: MODELS.claude.modelId,
            max_tokens: 150,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: text }],
          }),
        },
        extract: (data) => data.content?.[0]?.text,
      }),
    },
    deepseek: {
      defaultUrl: 'https://api.deepseek.com',
      modelId: 'deepseek-chat',
      buildRequest: (text, key, url) => ({
        url: url + '/v1/chat/completions',
        options: {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key,
          },
          body: JSON.stringify({
            model: MODELS.deepseek.modelId,
            max_tokens: 150,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: text },
            ],
          }),
        },
        extract: (data) => data.choices?.[0]?.message?.content,
      }),
    },
    mimo: {
      defaultUrl: 'https://api.mimo.com',
      modelId: 'mimo-7b',
      buildRequest: (text, key, url) => ({
        url: url + '/v1/chat/completions',
        options: {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key,
          },
          body: JSON.stringify({
            model: MODELS.mimo.modelId,
            max_tokens: 150,
            messages: [
              { role: 'system', content: SYSTEM_PROMPT },
              { role: 'user', content: text },
            ],
          }),
        },
        extract: (data) => data.choices?.[0]?.message?.content,
      }),
    },
    'mimo-v2.5-pro': {
      defaultUrl: 'https://token-plan-cn.xiaomimimo.com/anthropic',
      modelId: 'mimo-v2.5-pro',
      buildRequest: (text, key, url) => ({
        url: url + '/v1/messages',
        options: {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'mimo-v2.5-pro',
            max_tokens: 150,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: text }],
          }),
        },
        extract: (data) => data.content?.[0]?.text,
      }),
    },
  };

  // Load config
  if (window.chatBridge) {
    window.chatBridge.getConfig().then((cfg) => {
      apiKey = cfg.apiKey || '';
      model = cfg.model || 'claude';
      baseUrl = cfg.baseUrl || '';
    });
  }

  function addMsg(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    if (!apiKey) {
      addMsg('还没有配置 API Key 呢~ 右键宠物 → 设置', 'pet');
      sendBtn.disabled = false;
      return;
    }

    typing.classList.add('active');

    try {
      const cfg = MODELS[model] || MODELS.claude;
      const url = baseUrl || cfg.defaultUrl;
      const req = cfg.buildRequest(text, apiKey, url);

      const response = await fetch(req.url, req.options);
      const data = await response.json();
      typing.classList.remove('active');

      const reply = req.extract(data);
      if (reply) {
        addMsg(reply, 'pet');
      } else if (data.error) {
        console.error('[Chat] API error:', data.error);
        addMsg('出错了，请检查 API Key 和模型配置~', 'pet');
      } else {
        addMsg('没有收到回复...', 'pet');
      }
    } catch (e) {
      console.error('[Chat] Request failed:', e);
      typing.classList.remove('active');
      addMsg('连接失败了，请检查网络和配置~', 'pet');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function closeBubble() {
    if (window.chatBridge) window.chatBridge.close();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
    if (e.key === 'Escape') closeBubble();
  });

  input.focus();
</script>

</body>
</html>
