<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pet Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Courier New', monospace;
    user-select: none;
  }

  .bubble {
    position: absolute;
    bottom: 8px; left: 8px; right: 8px;
    background: #2a2a4a;
    border: 2px solid #3a3a5a;
    border-radius: 12px;
    padding: 12px;
    display: flex; flex-direction: column;
    gap: 8px;
    max-height: 200px;
  }

  .messages {
    max-height: 120px;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: #3a3a5a transparent;
  }

  .msg {
    font-size: 10px;
    line-height: 1.4;
    padding: 4px 8px;
    border-radius: 6px;
    max-width: 90%;
    word-break: break-word;
  }
  .msg.pet {
    background: #3a3a5a;
    color: #f5e6d0;
    align-self: flex-start;
  }
  .msg.user {
    background: #f5c6a0;
    color: #2a2a4a;
    align-self: flex-end;
  }

  .input-row {
    display: flex; gap: 6px;
  }

  #chatInput {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 6px 10px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  #chatInput:focus { border-color: #f5c6a0; }
  #chatInput::placeholder { color: #555; }

  #sendBtn {
    background: #f5c6a0;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    color: #2a2a4a;
    font-family: inherit;
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #sendBtn:hover { background: #f5e6d0; }
  #sendBtn:disabled { opacity: 0.5; cursor: default; }

  .typing {
    font-size: 9px;
    color: #888;
    padding: 2px 8px;
    display: none;
  }
  .typing.active { display: block; }

  .close-btn {
    position: absolute;
    top: 4px; right: 8px;
    background: none; border: none;
    color: #666; cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .close-btn:hover { color: #f5a0a0; }
</style>
</head>
<body>

<div class="bubble">
  <button class="close-btn" onclick="closeBubble()">&times;</button>
  <div class="messages" id="messages">
    <div class="msg pet">Hi! I'm your Claude Code pet~</div>
  </div>
  <div class="typing" id="typing">typing...</div>
  <div class="input-row">
    <input id="chatInput" placeholder="Say something..." maxlength="200" autocomplete="off" />
    <button id="sendBtn" onclick="send()">SEND</button>
  </div>
</div>

<script>
  const messages = document.getElementById('messages');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const typing = document.getElementById('typing');

  let apiKey = '';

  // Get API key from main process
  if (window.chatBridge) {
    window.chatBridge.getConfig().then((cfg) => {
      apiKey = cfg.apiKey || '';
    });
  }

  function addMsg(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    if (!apiKey) {
      addMsg('No API key configured. Set CLAUDE_API_KEY in settings.', 'pet');
      sendBtn.disabled = false;
      return;
    }

    typing.classList.add('active');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 150,
          system: 'You are a cute pixel fox desktop pet. Reply in 1-2 short sentences. Be playful, warm, and use occasional kaomoji like (=^・^=) or ~. Keep responses very brief.',
          messages: [{ role: 'user', content: text }],
        }),
      });

      const data = await response.json();
      typing.classList.remove('active');

      if (data.content && data.content[0]) {
        addMsg(data.content[0].text, 'pet');
      } else if (data.error) {
        addMsg('Error: ' + (data.error.message || 'Unknown'), 'pet');
      }
    } catch (e) {
      typing.classList.remove('active');
      addMsg('Connection error...', 'pet');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function closeBubble() {
    if (window.chatBridge) window.chatBridge.close();
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
    if (e.key === 'Escape') closeBubble();
  });

  input.focus();
</script>

</body>
</html>
