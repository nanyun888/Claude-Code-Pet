<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    color: #e0d5c8;
    user-select: none;
    overflow: hidden;
  }

  .panel {
    padding: 20px;
    display: flex; flex-direction: column;
    gap: 14px;
    height: 100%;
  }

  h1 {
    font-size: 14px; letter-spacing: 2px;
    color: #f5e6d0;
    border-bottom: 1px solid #3a3a5a;
    padding-bottom: 8px;
  }

  .field {
    display: flex; flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 10px; letter-spacing: 1px;
    color: #a0a0c0;
  }

  .field input, .field select {
    background: #2a2a4a;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 8px 12px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: #f5c6a0; }
  .field input::placeholder { color: #555; }
  .field select option { background: #2a2a4a; color: #f5e6d0; }

  .btn-row {
    display: flex; gap: 8px;
    margin-top: auto;
  }

  .btn {
    flex: 1;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #f5c6a0;
    color: #2a2a4a;
    font-weight: bold;
  }
  .btn-primary:hover { background: #f5e6d0; }

  .btn-secondary {
    background: #3a3a5a;
    color: #a0a0c0;
  }
  .btn-secondary:hover { background: #4a4a6a; color: #f5e6d0; }

  .status {
    font-size: 9px;
    color: #a0d8a0;
    min-height: 14px;
  }

  .model-info {
    font-size: 9px; color: #888;
    background: #222244;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 8px;
    line-height: 1.6;
  }
  .model-info b { color: #f5c6a0; }
</style>
</head>
<body>

<div class="panel">
  <h1 id="title"></h1>

  <div class="field">
    <label id="labelLang"></label>
    <select id="lang">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
  </div>

  <div class="field">
    <label id="labelModel"></label>
    <select id="model">
      <option value="claude">Claude (Anthropic)</option>
      <option value="deepseek">DeepSeek</option>
      <option value="mimo">MiMo</option>
      <option value="mimo-v2.5-pro">MiMo-v2.5-Pro</option>
      <option value="deepseek-v4-pro">DeepSeek-v4-Pro</option>
    </select>
  </div>

  <div class="field">
    <label id="labelApiKey"></label>
    <input id="apiKey" type="password" />
  </div>

  <div class="field">
    <label id="labelBaseUrl"></label>
    <input id="baseUrl" type="text" />
  </div>

  <div class="model-info" id="modelInfo"></div>

  <div class="status" id="status"></div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="cancelBtn"></button>
    <button class="btn btn-primary" id="saveBtn"></button>
  </div>
</div>

<script>
  // i18n
  const _strings = {
    zh: {
      title: '设置', lang: '语言', model: 'AI 模型', api_key: 'API Key',
      base_url: 'API Base URL（可选，自定义端点）', api_placeholder: '输入对应模型的 API Key',
      url_placeholder: '留空使用默认地址', cancel: '取消', save: '保存', saved: '已保存',
    },
    en: {
      title: 'Settings', lang: 'Language', model: 'AI Model', api_key: 'API Key',
      base_url: 'API Base URL (optional)', api_placeholder: 'Enter API Key for selected model',
      url_placeholder: 'Leave empty for default', cancel: 'Cancel', save: 'Save', saved: 'Saved',
    },
  };
  const MODEL_INFO = {
    zh: {
      claude: '<b>Claude</b> — api.anthropic.com<br>模型: claude-haiku-4-5-20251001<br>获取 Key: console.anthropic.com',
      deepseek: '<b>DeepSeek</b> — api.deepseek.com<br>模型: deepseek-chat<br>获取 Key: platform.deepseek.com',
      mimo: '<b>MiMo</b> — api.mimo.com (自定义)<br>模型: mimo-7b',
      'mimo-v2.5-pro': '<b>MiMo-v2.5-Pro</b> — token-plan-cn.xiaomimimo.com<br>模型: mimo-v2.5-pro<br>格式: Anthropic Messages API',
      'deepseek-v4-pro': '<b>DeepSeek-v4-Pro</b> — api.deepseek.com<br>模型: deepseek-v4-pro<br>格式: OpenAI Chat Completions',
    },
    en: {
      claude: '<b>Claude</b> — api.anthropic.com<br>Model: claude-haiku-4-5-20251001<br>Get Key: console.anthropic.com',
      deepseek: '<b>DeepSeek</b> — api.deepseek.com<br>Model: deepseek-chat<br>Get Key: platform.deepseek.com',
      mimo: '<b>MiMo</b> — api.mimo.com (custom)<br>Model: mimo-7b',
      'mimo-v2.5-pro': '<b>MiMo-v2.5-Pro</b> — token-plan-cn.xiaomimimo.com<br>Model: mimo-v2.5-pro<br>Format: Anthropic Messages API',
      'deepseek-v4-pro': '<b>DeepSeek-v4-Pro</b> — api.deepseek.com<br>Model: deepseek-v4-pro<br>Format: OpenAI Chat Completions',
    },
  };

  let _lang = navigator.language.startsWith('zh') ? 'zh' : 'en';
  function _t(k) { return (_strings[_lang] || _strings.zh)[k] || k; }

  function applyI18n() {
    document.getElementById('title').textContent = _t('title');
    document.getElementById('labelLang').textContent = _t('lang');
    document.getElementById('labelModel').textContent = _t('model');
    document.getElementById('labelApiKey').textContent = _t('api_key');
    document.getElementById('labelBaseUrl').textContent = _t('base_url');
    document.getElementById('apiKey').placeholder = _t('api_placeholder');
    document.getElementById('baseUrl').placeholder = _t('url_placeholder');
    document.getElementById('cancelBtn').textContent = _t('cancel');
    document.getElementById('saveBtn').textContent = _t('save');
    updateModelInfo();
  }

  function updateModelInfo() {
    const info = MODEL_INFO[_lang] || MODEL_INFO.zh;
    document.getElementById('modelInfo').innerHTML = info[document.getElementById('model').value] || '';
  }

  document.getElementById('model').addEventListener('change', updateModelInfo);
  document.getElementById('lang').addEventListener('change', () => {
    _lang = document.getElementById('lang').value;
    applyI18n();
  });

  // Load config
  if (window.settingsBridge) {
    window.settingsBridge.getConfig().then((cfg) => {
      document.getElementById('model').value = cfg.model || 'claude';
      document.getElementById('apiKey').value = cfg.apiKey || '';
      document.getElementById('baseUrl').value = cfg.baseUrl || '';
      if (cfg.lang) { _lang = cfg.lang; document.getElementById('lang').value = cfg.lang; }
      applyI18n();
    });
  }

  document.getElementById('saveBtn').addEventListener('click', () => {
    if (window.settingsBridge) {
      window.settingsBridge.saveConfig({
        model: document.getElementById('model').value,
        apiKey: document.getElementById('apiKey').value.trim(),
        baseUrl: document.getElementById('baseUrl').value.trim(),
        lang: document.getElementById('lang').value,
      });
      document.getElementById('status').textContent = _t('saved');
      setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
    }
  });

  document.getElementById('cancelBtn').addEventListener('click', () => {
    if (window.settingsBridge) window.settingsBridge.close();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && window.settingsBridge) window.settingsBridge.close();
  });

  applyI18n();
</script>

</body>
</html>
