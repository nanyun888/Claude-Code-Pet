<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>设置</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    color: #e0d5c8;
    user-select: none;
    overflow: hidden;
  }

  .panel {
    padding: 20px;
    display: flex; flex-direction: column;
    gap: 14px;
    height: 100%;
  }

  h1 {
    font-size: 14px; letter-spacing: 2px;
    color: #f5e6d0;
    border-bottom: 1px solid #3a3a5a;
    padding-bottom: 8px;
  }

  .field {
    display: flex; flex-direction: column;
    gap: 4px;
  }

  .field label {
    font-size: 10px; letter-spacing: 1px;
    color: #a0a0c0;
  }

  .field input, .field select {
    background: #2a2a4a;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 8px 12px;
    color: #f5e6d0;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: #f5c6a0; }
  .field input::placeholder { color: #555; }
  .field select option { background: #2a2a4a; color: #f5e6d0; }

  .hint {
    font-size: 9px; color: #666;
    line-height: 1.4;
  }

  .btn-row {
    display: flex; gap: 8px;
    margin-top: auto;
  }

  .btn {
    flex: 1;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #f5c6a0;
    color: #2a2a4a;
    font-weight: bold;
  }
  .btn-primary:hover { background: #f5e6d0; }

  .btn-secondary {
    background: #3a3a5a;
    color: #a0a0c0;
  }
  .btn-secondary:hover { background: #4a4a6a; color: #f5e6d0; }

  .status {
    font-size: 9px;
    color: #a0d8a0;
    min-height: 14px;
  }

  .model-info {
    font-size: 9px; color: #888;
    background: #222244;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    padding: 8px;
    line-height: 1.6;
  }
  .model-info b { color: #f5c6a0; }
</style>
</head>
<body>

<div class="panel">
  <h1>设置</h1>

  <div class="field">
    <label>AI 模型</label>
    <select id="model">
      <option value="claude">Claude (Anthropic)</option>
      <option value="deepseek">DeepSeek</option>
      <option value="mimo">MiMo</option>
      <option value="mimo-v2.5-pro">MiMo-v2.5-Pro</option>
      <option value="deepseek-v4-pro">DeepSeek-v4-Pro</option>
    </select>
  </div>

  <div class="field">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="输入对应模型的 API Key" />
  </div>

  <div class="field">
    <label>API Base URL（可选，自定义端点）</label>
    <input id="baseUrl" type="text" placeholder="留空使用默认地址" />
  </div>

  <div class="model-info" id="modelInfo"></div>

  <div class="status" id="status"></div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
    <button class="btn btn-primary" onclick="save()">保存</button>
  </div>
</div>

<script>
  const modelSelect = document.getElementById('model');
  const apiKeyInput = document.getElementById('apiKey');
  const baseUrlInput = document.getElementById('baseUrl');
  const status = document.getElementById('status');
  const modelInfo = document.getElementById('modelInfo');

  const MODEL_INFO = {
    claude: '<b>Claude</b> — api.anthropic.com<br>模型: claude-haiku-4-5-20251001<br>获取 Key: console.anthropic.com',
    deepseek: '<b>DeepSeek</b> — api.deepseek.com<br>模型: deepseek-chat<br>获取 Key: platform.deepseek.com',
    mimo: '<b>MiMo</b> — api.mimo.com (自定义)<br>模型: mimo-7b<br>获取 Key: 根据平台配置',
    'mimo-v2.5-pro': '<b>MiMo-v2.5-Pro</b> — token-plan-cn.xiaomimimo.com<br>模型: mimo-v2.5-pro (1M上下文自动开启)<br>格式: Anthropic Messages API<br>获取 Key: xiaomimimo.com',
    'deepseek-v4-pro': '<b>DeepSeek-v4-Pro</b> — api.deepseek.com<br>模型: deepseek-v4-pro<br>格式: OpenAI Chat Completions<br>获取 Key: platform.deepseek.com<br>注意: 需要单独的 DeepSeek API Key',
  };

  modelSelect.addEventListener('change', () => {
    modelInfo.innerHTML = MODEL_INFO[modelSelect.value] || '';
  });

  // Load current config
  if (window.settingsBridge) {
    window.settingsBridge.getConfig().then((cfg) => {
      modelSelect.value = cfg.model || 'claude';
      apiKeyInput.value = cfg.apiKey || '';
      baseUrlInput.value = cfg.baseUrl || '';
      modelInfo.innerHTML = MODEL_INFO[modelSelect.value] || '';
    });
  }

  function save() {
    if (window.settingsBridge) {
      const data = {
        model: modelSelect.value,
        apiKey: apiKeyInput.value.trim(),
        baseUrl: baseUrlInput.value.trim(),
      };
      console.log('[Settings] Saving:', JSON.stringify(data));
      window.settingsBridge.saveConfig(data);
      status.textContent = '已保存';
      setTimeout(() => { status.textContent = ''; }, 2000);
    } else {
      console.error('[Settings] settingsBridge not available');
    }
  }

  function closeSettings() {
    if (window.settingsBridge) window.settingsBridge.close();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSettings();
  });
</script>

</body>
</html>
